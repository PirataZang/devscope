version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/devscope
    binary: devscope
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/devscope/devscope/pkg/version.Version={{.Version}}
      - -X github.com/devscope/devscope/pkg/version.Commit={{.Commit}}
      - -X github.com/devscope/devscope/pkg/version.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - configs/*
      - docs/*

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
