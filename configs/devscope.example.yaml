scan:
  paths:
    - /var/www
    - /home
    - /opt
    - /srv
    - /workspace
    - /projetos
  max_depth: 5
  ignore:
    - node_modules
    - vendor
    - .git
    - .cache
    - dist
    - build
    - .next
    - target

refresh:
  scan_interval: 60s
  metrics_interval: 2s
  health_interval: 10s
  git_interval: 30s

ui:
  theme: auto

health:
  timeout: 5s
  concurrent: 10

pinned: []
  # - /var/www/meu-projeto-principal
